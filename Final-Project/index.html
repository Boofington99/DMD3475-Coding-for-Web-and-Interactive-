<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final-Project-ClassicGame</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🎮 Arcade Hub</h1>
    <p>Snake Game + Player System</p>
  </header>

  <main class="container">

    <!-- GAME HEADER -->
    <section class="panel">
      <h2>Snake Game</h2>

      <div class="game-header">
        <div id="scoreDisplay">Score: 0</div>
        <button id="startGameBtn">Start Game</button>
      </div>
    </section>

    <!-- GAME AREA -->
    <section class="panel">
      <h2>Game Area</h2>

      <div id="gameArea">
        <p>Game will render here</p>
      </div>
    </section>

    <!-- PLAYERS -->
    <section class="panel">
      <h2>Players</h2>

      <div class="add-player">
        <input type="text" id="playerName" placeholder="Enter player name">
        <button id="addPlayerBtn">Add Player</button>
      </div>

      <ul id="playerList"></ul>
    </section>

    <!-- LEADERBOARD -->
    <section class="panel">
      <h2>Leaderboard</h2>

      <div class="controls">
        <button id="sortHigh">Sort High → Low</button>
        <button id="sortLow">Sort Low → High</button>
      </div>

      <ul id="leaderboard"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
