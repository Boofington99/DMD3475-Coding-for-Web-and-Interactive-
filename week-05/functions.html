<body>
    <h1>Functions Practice</h1>

    <div>
        <input type="number" id="num1" placeholder="enter num1">
        <input type="number" id="num2" placeholder="enter num2">

        <button id="calculate">Get the Sum<summary></summary></button>
    </div>
<br>
<h2>Grade Calculator</h2>
    <div id="grade-calc">
        <label for="numberGrade">Enter Your Number</label>
        <input type="number" id="numberGrade" placeholder="enter your number grade.">

        <button id="gradeButton">Calculate Letter Grade</button>
    </div>


    <div id="console">
        <h2>Our Console</h2>
        <p>Test paragraph number 1</p>
        <p>Test paragraph number 2</p>
    </div>
    <script>
        var myConsole = document.querySelector("#console");

        //place a paragprah that says "hello world" inside the #console
        
        function log(message){
            // myConsole.innerHTML += "<p>Hello World</p>";
            // myConsole.innerHTML += "<p>My Name is Matthew</p>";
            myConsole.innerHTML += "<p>" + message + "</p>";
        }

        function add(num1, num2){
            var sum = num1 + num2;

            return sum;
        }

        var calceButton = document.querySelector("#calculate");

        calceButton.addEventListener("click", function(){
            var num1 = parseInt(document.querySelector("#num1").value);
            var num2 = parseInt(document.querySelector("#num2").value);

            log(add(num1, num2));
        });


        log("Hello World");
        log("My Name is Matthew");
        log("It is Thursday");
        log(add(12, 40));


        function calcLetterGrade(numberGrade){
            var letterGrade = "A";

            if (numberGrade < 93 && numberGrade >= 90){
                letterGrade = "A-";
            } else if (numberGrade < 90 && numberGrade >= 87){
                letterGrade = "B+";
            } else if (numberGrade < 87 && numberGrade >= 83){
                letterGrade = "B";
            } else if (numberGrade < 83 && numberGrade >= 80){
                letterGrade = "B-";
            } else if (numberGrade < 80 && numberGrade >= 77){
                letterGrade = "C+";
            } else if (numberGrade < 77 && numberGrade >= 74){
                letterGrade = "C";
            } else if (numberGrade < 74 && numberGrade >= 70){
                letterGrade = "C-";
            } else if (numberGrade < 70 && numberGrade >= 67){
                letterGrade = "D+";
            } else if (numberGrade < 67 && numberGrade >= 64){
                letterGrade = "D";
            } else if (numberGrade < 64 && numberGrade >= 60){
                letterGrade = "D-";
            } else if (numberGrade < 60){
                letterGrade = "F";
            }

            return letterGrade;
        }

        var gradeCalcButton = document.querySelector("#gradeButton");

        gradeCalcButton.addEventListener("click", function(){
            var numberGrade = parseInt(document.querySelector("#numberGrade").value);

            var letterGrade = calcLetterGrade(numberGrade);

            var message = "Your letter grade is: " + letterGrade;

            log(message);
        });

    </script>
</body>
</html>
